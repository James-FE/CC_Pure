<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #fafafa; color: #333; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #222; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    #todoInput { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; outline: none; transition: border-color 0.15s; }
    #todoInput:focus { border-color: #D77757; }
    #addBtn { padding: 10px 20px; background: #D77757; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.15s; }
    #addBtn:hover { background: #c0654a; }
    table { width: 100%; border-collapse: collapse; }
    tr { border-bottom: 1px solid #e0e0e0; }
    td { padding: 10px 14px; font-size: 0.95rem; }
    td:first-child { width: 100%; }
    td:last-child { width: 40px; text-align: center; }
    .delete-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; }
    .delete-btn:hover { color: #D77757; background: #fff0ec; }
    #emptyMsg { text-align: center; color: #999; padding: 32px 0; }
  </style>
</head>
<body>
  <h1>TODO</h1>
  <div class="input-row">
    <input type="text" id="todoInput" placeholder="What needs to be done?" autofocus>
    <button id="addBtn">Add</button>
  </div>
  <table id="todoTable">
    <tbody id="todoBody"></tbody>
  </table>
  <p id="emptyMsg">No tasks yet. Add one above.</p>

  <script>
    // Load persisted todos from localStorage
    const STORAGE_KEY = 'todos';
    let todos = [];
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) todos = JSON.parse(stored);
    } catch { /* ignore corrupt data */ }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }
    const todoBody = document.getElementById('todoBody');
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const emptyMsg = document.getElementById('emptyMsg');

    function render() {
      todoBody.innerHTML = '';
      emptyMsg.style.display = todos.length ? 'none' : 'block';
      todos.forEach((todo, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${escapeHtml(todo)}</td><td><button class="delete-btn" data-index="${i}">&times;</button></td>`;
        todoBody.appendChild(tr);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todos.push(text);
      saveTodos();
      todoInput.value = '';
      render();
    }

    addBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });
    todoBody.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) {
        todos.splice(Number(e.target.dataset.index), 1);
        saveTodos();
        render();
      }
    });

    render();
  </script>
</body>
</html>
